[build]
  command = "npm run build"
  publish = "dist"

# Handle SPA routing - redirect all non-existent files to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Production environment - set VITE_API_URL in Netlify dashboard
# Example: https://api.beefmaps.com or https://your-server.com:3001
[context.production]
  environment = { VITE_API_URL = "https://api.beefmaps.com" }

[context.deploy-preview]
  environment = { VITE_API_URL = "https://api.beefmaps.com" }

[context.branch-deploy]
  environment = { VITE_API_URL = "https://api.beefmaps.com" }
