<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <meta name="description" content="BeefDeck — Global beef industry intelligence. Cattle prices, USDA data, trade flows, disease alerts, drought monitoring."/>
  <meta name="theme-color" content="#0d0b08"/>
  <!-- Open Graph -->
  <meta property="og:title" content="BeefDeck Intelligence"/>
  <meta property="og:description" content="Global beef industry intelligence dashboard. CME futures, USDA reports, trade flows, disease alerts."/>
  <meta property="og:type" content="website"/>
  <title>BeefDeck Intelligence</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Playfair+Display:wght@700;900&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d0b08;
      --surface: #141209;
      --border: #2a2418;
      --border-bright: #3d3326;
      --amber: #c8882a;
      --amber-dim: #7a5218;
      --bone: #e8e0d0;
      --bone-dim: #8a8070;
      --red: #c0392b;
      --green: #4a8c3f;
      --green-bright: #6ab860;
      --blue: #2a6080;
      --yellow: #d4a017;
      --purple: #9b59b6;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; background: var(--bg); color: var(--bone); font-family: 'IBM Plex Sans', sans-serif; font-size: 13px; }
    #root { height: 100%; }

    @keyframes fadeUp    { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
    @keyframes pulse-dot { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.7)} }
    @keyframes scanline  { 0%{transform:translateY(-100%)} 100%{transform:translateY(100vh)} }
    @keyframes scroll-ticker { 0%{transform:translateX(0)} 100%{transform:translateX(-50%)} }
    @keyframes slide-in  { from{transform:translateX(-100%);opacity:0} to{transform:translateX(0);opacity:1} }

    /* ── SCANLINE ── */
    .scanline { position:fixed; top:0; left:0; right:0; height:2px; background:linear-gradient(transparent,rgba(200,136,42,0.05),transparent); pointer-events:none; z-index:9999; animation:scanline 9s linear infinite; }

    /* ── DESKTOP LAYOUT ── */
    .dashboard { display:grid; grid-template-rows:48px 1fr; height:100vh; overflow:hidden; }

    .header { background:var(--surface); border-bottom:1px solid var(--border-bright); display:flex; align-items:center; padding:0 16px; gap:16px; flex-shrink:0; animation:fadeUp 0.4s ease both; z-index:100; position:relative; }
    .header-logo { font-family:'Playfair Display',serif; font-weight:900; font-size:18px; color:var(--amber); letter-spacing:-0.5px; white-space:nowrap; flex-shrink:0; }
    .header-logo span { color:var(--bone-dim); font-weight:400; font-size:10px; font-family:'IBM Plex Mono',monospace; margin-left:8px; letter-spacing:2px; text-transform:uppercase; }
    .header-divider { width:1px; height:22px; background:var(--border-bright); flex-shrink:0; }
    .live-badge { display:flex; align-items:center; gap:5px; font-family:'IBM Plex Mono',monospace; font-size:9px; letter-spacing:2px; color:var(--green-bright); text-transform:uppercase; white-space:nowrap; flex-shrink:0; }
    .live-dot { width:6px; height:6px; border-radius:50%; background:var(--green-bright); animation:pulse-dot 1.5s ease-in-out infinite; flex-shrink:0; }
    .header-clock { font-family:'IBM Plex Mono',monospace; font-size:9px; color:var(--bone-dim); white-space:nowrap; flex-shrink:0; }
    .header-stats { display:flex; gap:16px; margin-left:auto; }
    .header-stat { display:flex; flex-direction:column; align-items:flex-end; }
    .header-stat-label { font-family:'IBM Plex Mono',monospace; font-size:8px; color:var(--bone-dim); letter-spacing:1.5px; text-transform:uppercase; }
    .header-stat-value { font-family:'IBM Plex Mono',monospace; font-size:12px; font-weight:600; }
    .val-up   { color:var(--green-bright); }
    .val-down { color:var(--red); }
    .val-red  { color:var(--red); }

    /* hamburger — desktop hidden */
    .hamburger { display:none; flex-direction:column; gap:4px; cursor:pointer; padding:4px; flex-shrink:0; }
    .hamburger span { display:block; width:20px; height:2px; background:var(--bone-dim); border-radius:1px; transition:all 0.2s; }

    .main { display:grid; grid-template-columns:210px 1fr 275px; overflow:hidden; height:100%; position:relative; }

    /* ── SIDEBAR ── */
    .sidebar { background:var(--surface); border-right:1px solid var(--border); display:flex; flex-direction:column; overflow-y:auto; animation:fadeUp 0.4s ease 0.1s both; }
    .sidebar::-webkit-scrollbar { width:3px; }
    .sidebar::-webkit-scrollbar-thumb { background:var(--border-bright); }
    .sidebar-section { padding:12px 14px; border-bottom:1px solid var(--border); }
    .sidebar-section-label { font-family:'IBM Plex Mono',monospace; font-size:9px; color:var(--amber-dim); letter-spacing:2px; text-transform:uppercase; margin-bottom:8px; }
    .layer-toggle { display:flex; align-items:center; gap:8px; padding:5px 6px; border-radius:3px; cursor:pointer; transition:background 0.15s; margin-bottom:2px; user-select:none; }
    .layer-toggle:hover  { background:rgba(200,136,42,0.06); }
    .layer-toggle.active { background:rgba(200,136,42,0.10); }
    .toggle-dot { width:8px; height:8px; border-radius:50%; border:1.5px solid var(--border-bright); flex-shrink:0; transition:all 0.2s; }
    .toggle-label { font-size:11px; color:var(--bone-dim); transition:color 0.2s; }
    .layer-toggle.active .toggle-label { color:var(--bone); }
    .sidebar-alert-mini { margin-bottom:7px; padding:6px 8px; background:rgba(192,57,43,0.07); border-radius:3px; }

    /* ── CENTER ── */
    .center { display:grid; grid-template-rows:1fr 195px; overflow:hidden; }
    .map-area { position:relative; background:var(--bg); overflow:hidden; }
    .map-container { position:absolute; inset:0; bottom:36px; }
    .map-svg { width:100%; height:100%; }
    .map-overlay-label { position:absolute; top:10px; left:12px; font-family:'IBM Plex Mono',monospace; font-size:9px; color:var(--amber-dim); letter-spacing:2px; text-transform:uppercase; pointer-events:none; }
    .map-legend { position:absolute; bottom:44px; left:12px; display:flex; flex-direction:column; gap:3px; pointer-events:none; }
    .legend-item { display:flex; align-items:center; gap:5px; font-family:'IBM Plex Mono',monospace; font-size:8px; color:var(--bone-dim); }
    .legend-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }

    /* ticker */
    .ticker-bar { background:var(--surface); border-top:1px solid var(--border-bright); display:flex; overflow:hidden; position:absolute; bottom:0; left:0; right:0; height:36px; align-items:center; }
    .ticker-label { font-family:'IBM Plex Mono',monospace; font-size:9px; color:var(--amber); letter-spacing:2px; text-transform:uppercase; padding:0 12px; white-space:nowrap; border-right:1px solid var(--border-bright); height:100%; display:flex; align-items:center; background:var(--surface); z-index:2; flex-shrink:0; }
    .ticker-scroll-wrap { flex:1; overflow:hidden; height:100%; display:flex; align-items:center; }
    .ticker-track { display:flex; animation:scroll-ticker 45s linear infinite; white-space:nowrap; }
    .ticker-item { display:inline-flex; align-items:center; gap:6px; padding:0 16px; border-right:1px solid var(--border); font-family:'IBM Plex Mono',monospace; font-size:11px; flex-shrink:0; }
    .t-name { color:var(--bone-dim); }
    .t-price { color:var(--bone); font-weight:600; }
    .t-chg.pos { color:var(--green-bright); }
    .t-chg.neg { color:var(--red); }

    /* charts row */
    .charts-row { display:grid; grid-template-columns:1fr 1fr 1fr; border-top:1px solid var(--border); overflow:hidden; }
    .chart-cell { border-right:1px solid var(--border); padding:10px 12px; display:flex; flex-direction:column; gap:4px; min-width:0; }
    .chart-cell:last-child { border-right:none; }
    .chart-title { font-family:'IBM Plex Mono',monospace; font-size:8px; color:var(--bone-dim); letter-spacing:1.5px; text-transform:uppercase; }
    .chart-value { font-family:'IBM Plex Mono',monospace; font-size:17px; font-weight:600; color:var(--amber); }
    .chart-sub   { font-family:'IBM Plex Mono',monospace; font-size:9px; color:var(--bone-dim); }

    /* ── RIGHT PANEL ── */
    .right-panel { background:var(--surface); border-left:1px solid var(--border); display:flex; flex-direction:column; overflow:hidden; animation:fadeUp 0.4s ease 0.2s both; }
    .panel-tabs { display:flex; border-bottom:1px solid var(--border-bright); flex-shrink:0; overflow-x:auto; }
    .panel-tabs::-webkit-scrollbar { display:none; }
    .panel-tab { flex:1; min-width:52px; padding:10px 6px; font-family:'IBM Plex Mono',monospace; font-size:8px; letter-spacing:1px; text-transform:uppercase; color:var(--bone-dim); cursor:pointer; border-right:1px solid var(--border); text-align:center; transition:all 0.2s; white-space:nowrap; user-select:none; }
    .panel-tab:last-child { border-right:none; }
    .panel-tab:hover  { color:var(--bone); background:rgba(200,136,42,0.05); }
    .panel-tab.active { color:var(--amber); border-bottom:2px solid var(--amber); background:rgba(200,136,42,0.07); }
    .panel-content { flex:1; overflow-y:auto; padding:12px; }
    .panel-content::-webkit-scrollbar { width:3px; }
    .panel-content::-webkit-scrollbar-thumb { background:var(--border-bright); }

    /* feed */
    .feed-item { border-bottom:1px solid var(--border); padding:9px 0; }
    .feed-item:last-child { border-bottom:none; }
    .feed-cat { font-family:'IBM Plex Mono',monospace; font-size:8px; letter-spacing:2px; text-transform:uppercase; margin-bottom:3px; }
    .feed-cat.alert  { color:var(--red); }
    .feed-cat.market { color:var(--green); }
    .feed-cat.policy { color:var(--blue); }
    .feed-cat.default { color:var(--amber-dim); }
    .feed-hl   { font-size:11px; color:var(--bone); line-height:1.5; margin-bottom:3px; }
    .feed-meta { font-family:'IBM Plex Mono',monospace; font-size:9px; color:var(--bone-dim); }

    /* alerts */
    .alert-item { background:rgba(192,57,43,0.08); border:1px solid rgba(192,57,43,0.25); border-radius:3px; padding:10px; margin-bottom:8px; }
    .alert-level { font-family:'IBM Plex Mono',monospace; font-size:8px; color:var(--red); letter-spacing:2px; text-transform:uppercase; margin-bottom:4px; display:flex; align-items:center; gap:5px; }
    .alert-level.watch { color:var(--yellow); }
    .alert-text   { font-size:11px; color:var(--bone); line-height:1.5; }
    .alert-region { font-family:'IBM Plex Mono',monospace; font-size:9px; color:var(--bone-dim); margin-top:4px; }

    /* usda */
    .report-item  { border-bottom:1px solid var(--border); padding:9px 0; }
    .report-title { font-size:11px; color:var(--bone); margin-bottom:3px; }
    .report-date  { font-family:'IBM Plex Mono',monospace; font-size:9px; color:var(--bone-dim); }
    .report-badge { display:inline-block; font-family:'IBM Plex Mono',monospace; font-size:8px; padding:2px 5px; border-radius:2px; background:rgba(200,136,42,0.15); color:var(--amber); margin-left:5px; }
    .report-badge.live { background:rgba(106,184,96,0.15); color:var(--green-bright); }

    /* trade */
    .trade-table { width:100%; border-collapse:collapse; }
    .trade-table th { font-family:'IBM Plex Mono',monospace; font-size:8px; color:var(--bone-dim); letter-spacing:1.5px; text-transform:uppercase; text-align:left; padding:5px 4px; border-bottom:1px solid var(--border-bright); }
    .trade-table td { font-family:'IBM Plex Mono',monospace; font-size:10px; color:var(--bone); padding:6px 4px; border-bottom:1px solid var(--border); }
    .trade-table td.pos { color:var(--green-bright); }
    .trade-table td.neg { color:var(--red); }

    .section-hdr { font-family:'IBM Plex Mono',monospace; font-size:9px; color:var(--amber-dim); letter-spacing:2px; text-transform:uppercase; padding:6px 0; border-bottom:1px solid var(--border); margin-bottom:8px; }

    /* ai */
    .ai-wrap  { display:flex; flex-direction:column; height:100%; }
    .ai-msgs  { flex:1; overflow-y:auto; padding-bottom:6px; }
    .ai-msgs::-webkit-scrollbar { width:3px; }
    .ai-msgs::-webkit-scrollbar-thumb { background:var(--border-bright); }
    .ai-msg       { margin-bottom:10px; animation:fadeUp 0.3s ease both; }
    .ai-role      { font-family:'IBM Plex Mono',monospace; font-size:8px; color:var(--amber-dim); letter-spacing:2px; text-transform:uppercase; margin-bottom:3px; }
    .ai-role.user { color:var(--bone-dim); }
    .ai-body      { font-size:11px; color:var(--bone); line-height:1.6; background:rgba(255,255,255,0.03); border-left:2px solid var(--border-bright); padding:6px 8px; border-radius:0 3px 3px 0; }
    .ai-body.user { background:rgba(200,136,42,0.06); border-left-color:var(--amber-dim); color:var(--bone-dim); }
    .ai-input-row { display:flex; gap:6px; padding-top:8px; border-top:1px solid var(--border); flex-shrink:0; }
    .ai-input { flex:1; background:rgba(255,255,255,0.04); border:1px solid var(--border-bright); border-radius:3px; color:var(--bone); font-family:'IBM Plex Mono',monospace; font-size:11px; padding:6px 10px; outline:none; transition:border-color 0.2s; min-width:0; }
    .ai-input:focus { border-color:var(--amber-dim); }
    .ai-input::placeholder { color:var(--bone-dim); opacity:0.5; }
    .ai-btn { background:var(--amber); border:none; border-radius:3px; color:var(--bg); font-family:'IBM Plex Mono',monospace; font-size:10px; font-weight:600; padding:6px 12px; cursor:pointer; letter-spacing:1px; text-transform:uppercase; transition:opacity 0.2s; flex-shrink:0; }
    .ai-btn:hover    { opacity:0.85; }
    .ai-btn:disabled { opacity:0.4; cursor:not-allowed; }
    .typing { display:inline-flex; gap:3px; align-items:center; padding:4px 0; }
    .typing span { width:4px; height:4px; border-radius:50%; background:var(--amber-dim); animation:pulse-dot 1s ease-in-out infinite; }
    .typing span:nth-child(2) { animation-delay:0.2s; }
    .typing span:nth-child(3) { animation-delay:0.4s; }

    /* ── MOBILE DRAWER OVERLAY ── */
    .drawer-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:200; }
    .drawer-overlay.open { display:block; }
    .drawer { position:fixed; top:48px; left:0; bottom:0; width:260px; background:var(--surface); border-right:1px solid var(--border-bright); z-index:201; overflow-y:auto; transform:translateX(-100%); transition:transform 0.25s ease; }
    .drawer.open { transform:translateX(0); animation:slide-in 0.25s ease; }
    .drawer::-webkit-scrollbar { width:3px; }
    .drawer::-webkit-scrollbar-thumb { background:var(--border-bright); }

    /* ── MOBILE BOTTOM NAV ── */
    .mobile-nav { display:none; position:fixed; bottom:0; left:0; right:0; background:var(--surface); border-top:1px solid var(--border-bright); z-index:150; height:52px; }
    .mobile-nav-inner { display:flex; height:100%; }
    .mobile-nav-btn { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px; cursor:pointer; user-select:none; transition:background 0.15s; border:none; background:none; color:var(--bone-dim); padding:0; }
    .mobile-nav-btn:hover  { background:rgba(200,136,42,0.05); }
    .mobile-nav-btn.active { color:var(--amber); }
    .mobile-nav-icon { font-size:14px; line-height:1; }
    .mobile-nav-label { font-family:'IBM Plex Mono',monospace; font-size:7px; letter-spacing:1px; text-transform:uppercase; }

    /* ── MOBILE MAIN CONTENT ── */
    .mobile-screen { display:none; flex-direction:column; height:100%; overflow:hidden; }

    /* ── RESPONSIVE BREAKPOINT ── */
    @media (max-width: 900px) {
      .dashboard { grid-template-rows:48px 1fr; height:100dvh; }
      .header-clock { display:none; }
      .header-divider { display:none; }
      .header-stats { gap:10px; }
      .header-stat-label { font-size:7px; }
      .header-stat-value { font-size:11px; }
      .hamburger { display:flex; }
      .main { grid-template-columns:1fr; }
      .sidebar { display:none; }
      .center  { display:none; }
      .right-panel { display:none; }
      .mobile-nav { display:block; }
      .mobile-screen { display:flex; }

      body { overflow:hidden; }
    }

    @media (max-width: 480px) {
      .header-stats { gap:6px; }
      .header-stat { display:none; }
      .header-stat:nth-child(1),
      .header-stat:nth-child(4) { display:flex; }
    }

    /* mobile map fills screen */
    .mobile-map-wrap { position:relative; flex:1; overflow:hidden; min-height:0; }
    .mobile-chart-row { display:grid; grid-template-columns:1fr 1fr; border-top:1px solid var(--border); flex-shrink:0; }
    .mobile-chart-cell { border-right:1px solid var(--border); padding:8px 10px; }
    .mobile-chart-cell:last-child { border-right:none; }
    .mobile-chart-cell:nth-child(3) { border-right:none; grid-column:1/-1; border-top:1px solid var(--border); }
    .mobile-ticker { position:absolute; bottom:0; left:0; right:0; }

    /* panel fills mobile screen */
    .mobile-panel { flex:1; overflow-y:auto; padding:12px 12px 64px; }
    .mobile-panel::-webkit-scrollbar { width:3px; }
    .mobile-panel::-webkit-scrollbar-thumb { background:var(--border-bright); }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

/* ── DATA ── */

function aiRespond(q) {
  const l = q.toLowerCase();
  if (l.match(/price|futures|cattle|market/))    return AI_CANNED.price;
  if (l.match(/disease|fmd|outbreak|foot/))      return AI_CANNED.disease;
  if (l.match(/trade|export|japan|korea/))       return AI_CANNED.trade;
  if (l.match(/drought|fire|wildfire|rain|dry/)) return AI_CANNED.drought;
  return AI_CANNED.default;
}

function Sparkline({data, color, height=44}) {
  const w=200, h=height;
  const min=Math.min(...data), max=Math.max(...data), rng=max-min||1;
  const pts=data.map((v,i)=>{
    const x=(i/(data.length-1))*w;
    const y=h-((v-min)/rng)*(h-6)-3;
    return `${x},${y}`;
  });
  const id=`g${color.replace("#","")}`;
  const [lx,ly]=pts[pts.length-1].split(",");
  return (
    <svg viewBox={`0 0 ${w} ${h}`} style={{width:"100%",height,display:"block"}}>
      <defs>
        <linearGradient id={id} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={color} stopOpacity="0.28"/>
          <stop offset="100%" stopColor={color} stopOpacity="0"/>
        </linearGradient>
      </defs>
      <polygon points={`0,${h} ${pts.join(" ")} ${w},${h}`} fill={`url(#${id})`}/>
      <polyline points={pts.join(" ")} fill="none" stroke={color} strokeWidth="1.5"/>
      <circle cx={lx} cy={ly} r="3" fill={color}/>
    </svg>
  );
}

function AIPanel() {
  const [msgs,   setMsgs]   = useState([{role:"a",text:"BeefDeck AI Analyst online. Ask me about cattle prices, USDA data, trade flows, disease alerts, or rancher-direct markets."}]);
  const [input,  setInput]  = useState("");
  const [loading,setLoading]= useState(false);
  const endRef = useRef(null);

  useEffect(()=>{ if(endRef.current) endRef.current.scrollIntoView({behavior:"smooth"}); },[msgs]);

  const send = async () => {
    if (!input.trim()||loading) return;
    const q=input.trim(); setInput("");
    setMsgs(m=>[...m,{role:"u",text:q}]);
    setLoading(true);
    await new Promise(r=>setTimeout(r,1200));
    setMsgs(m=>[...m,{role:"a",text:aiRespond(q)}]);
    setLoading(false);
  };

  return (
    <div className="ai-wrap">
      <div className="ai-msgs">
        {msgs.map((m,i)=>(
          <div key={i} className="ai-msg">
            <div className={`ai-role ${m.role==="u"?"user":""}`}>{m.role==="u"?"YOU":"BEEFDECK ANALYST"}</div>
            <div className={`ai-body ${m.role==="u"?"user":""}`}>{m.text}</div>
          </div>
        ))}
        {loading && (
          <div className="ai-msg">
            <div className="ai-role">BEEFDECK ANALYST</div>
            <div className="ai-body"><div className="typing"><span/><span/><span/></div></div>
          </div>
        )}
        <div ref={endRef}/>
      </div>
      <div className="ai-input-row">
        <input className="ai-input" placeholder="Ask about prices, drought, FMD, trade..."
          value={input} onChange={e=>setInput(e.target.value)}
          onKeyDown={e=>e.key==="Enter"&&send()}/>
        <button className="ai-btn" onClick={send} disabled={loading}>ASK</button>
      </div>
    </div>
  );
}
